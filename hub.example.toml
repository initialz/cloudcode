# Cloudcode Hub 配置示例
# 复制为 hub.toml 后填入真实值。
# 启动（前台）：cloudcode-hub serve --config hub.toml
# 启动（守护）：cloudcode-hub daemon start --config hub.toml

[server]
# 对外监听地址。生产配在反向代理后（nginx/caddy + TLS），代理转发到 127.0.0.1:7000。
listen = "0.0.0.0:7000"
audit_log = "./audit.jsonl"

# 可选：API key 模式回退后端。配了则使用此 key 直连 Anthropic。
# 删除整个 [anthropic] 段表示「只允许订阅模式」。
[anthropic]
upstream = "https://api.anthropic.com"
api_key = "sk-ant-xxxxxxxxxxxxxxxxxxxx"

# 订阅模式 agent 槽位。每个槽位代表一台允许连入的 agent；
# agent 通过出站 WebSocket 连接 /v1/agent/ws，并在 hello 帧上报 name + secret。
# secret 必须 argon2 verify 出与 `shared_secret_hash` 一致，且 name 与本条匹配。
# 同 name 多连接：先到先得，后到的会被拒。
# [[agents]]
# name = "peter-mbp"
# shared_secret_hash = "$argon2id$v=19$m=19456,t=2,p=1$..."

# 账号：通过 `cloudcode-hub gen-token <name>` 生成 token 与 hash。
# - allowed_providers: API key 模式访问权限。["anthropic"] 或 ["*"]。
# - allowed_agents: 订阅模式可路由到的 agent 名字列表，按顺序匹配，第一个在线的胜出。
# 路由策略：先按 allowed_agents 顺序选第一个「在线」agent；
# 没有可用 agent 时回落到 [anthropic] API key（需 allowed_providers 含 "anthropic"）；
# 两者都没有则 403。在线 agent 不存在 ⇒ 503（让 client 自己决定重试或换 agent）。
[[accounts]]
name = "alice"
token_hash = "$argon2id$v=19$m=19456,t=2,p=1$..."
allowed_providers = ["anthropic"]
allowed_agents = []

# [[accounts]]
# name = "bob"
# token_hash = "$argon2id$..."
# allowed_providers = []
# allowed_agents = ["peter-mbp"]
