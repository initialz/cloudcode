<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 720"
     font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="16">
  <!-- Explicit white background so the diagram stays legible on
       dark-mode GitHub (which otherwise renders the page on black). -->
  <rect width="100%" height="100%" fill="#ffffff"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <marker id="arrow-start" viewBox="0 0 10 10" refX="1" refY="5"
            markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 10 0 L 0 5 L 10 10 z" fill="#374151"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9ca3af"/>
    </marker>
  </defs>

  <text x="700" y="50" text-anchor="middle" font-size="26" font-weight="700" fill="#111827">cloudcode architecture</text>
  <text x="700" y="80" text-anchor="middle" font-size="16" fill="#4b5563">PTY bytes stream from a native tmux+claude on the agent through the hub to any terminal</text>

  <!-- Client -->
  <rect x="30" y="180" width="240" height="240" rx="14" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="150" y="220" text-anchor="middle" font-size="22" font-weight="700" fill="#1e3a8a">Client</text>
  <text x="150" y="246" text-anchor="middle" font-size="17" fill="#1d4ed8">cloudcode</text>
  <text x="150" y="290" text-anchor="middle" font-size="15" fill="#1f2937">raw-mode PTY pump</text>
  <text x="150" y="315" text-anchor="middle" font-size="15" fill="#1f2937">menu picker · Ctrl+\</text>
  <text x="150" y="380" text-anchor="middle" font-size="15" fill="#475569" font-style="italic">Laptop · phone · SSH</text>

  <!-- Hub -->
  <rect x="320" y="160" width="290" height="320" rx="14" fill="#d1fae5" stroke="#047857" stroke-width="2"/>
  <text x="465" y="200" text-anchor="middle" font-size="22" font-weight="700" fill="#065f46">Hub</text>
  <text x="465" y="226" text-anchor="middle" font-size="17" fill="#047857">cloudcode-hub</text>
  <text x="465" y="266" text-anchor="middle" font-size="15" fill="#1f2937">- PTY relay · session router</text>
  <text x="465" y="290" text-anchor="middle" font-size="15" fill="#1f2937">- account auth + 2-way ACL</text>
  <text x="465" y="314" text-anchor="middle" font-size="15" fill="#1f2937">- audit · sessions · messages</text>

  <!-- Admin SPA pill -->
  <rect x="345" y="338" width="240" height="84" rx="8" fill="#ffffff" stroke="#047857" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="465" y="364" text-anchor="middle" font-size="15" font-weight="600" fill="#065f46">embedded admin UI</text>
  <text x="465" y="386" text-anchor="middle" font-size="13" font-family="ui-monospace, Menlo, monospace" fill="#1f2937">React SPA · /admin/</text>
  <text x="465" y="406" text-anchor="middle" font-size="13" font-family="ui-monospace, Menlo, monospace" fill="#1f2937">SQLite backend</text>

  <text x="465" y="456" text-anchor="middle" font-size="15" fill="#475569" font-style="italic">Public-facing host</text>

  <!-- Agent (with internal tmux+claude box) -->
  <rect x="660" y="130" width="400" height="380" rx="14" fill="#ffedd5" stroke="#c2410c" stroke-width="2"/>
  <text x="860" y="170" text-anchor="middle" font-size="22" font-weight="700" fill="#7c2d12">Agent</text>
  <text x="860" y="196" text-anchor="middle" font-size="17" fill="#9a3412">cloudcode-agent</text>
  <text x="860" y="240" text-anchor="middle" font-size="15" fill="#1f2937">dials hub over WSS</text>
  <text x="860" y="264" text-anchor="middle" font-size="15" fill="#1f2937">per-workspace tmux server</text>
  <text x="860" y="288" text-anchor="middle" font-size="15" fill="#1f2937">macOS Seatbelt sandbox (opt-in)</text>

  <!-- tmux + claude subprocess box -->
  <rect x="690" y="328" width="340" height="140" rx="8" fill="#ffffff" stroke="#c2410c" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="860" y="356" text-anchor="middle" font-size="15" font-weight="600" fill="#7c2d12">tmux + claude (per workspace)</text>
  <text x="860" y="386" text-anchor="middle" font-size="13" font-family="ui-monospace, Menlo, monospace" fill="#1f2937">tmux -L cc-&lt;acct&gt;-&lt;ws&gt;</text>
  <text x="860" y="408" text-anchor="middle" font-size="13" font-family="ui-monospace, Menlo, monospace" fill="#1f2937">└─ claude (native TUI)</text>
  <text x="860" y="446" text-anchor="middle" font-size="13" fill="#475569" font-style="italic">survives disconnect · auto --continue on reattach</text>

  <!-- Anthropic -->
  <rect x="1110" y="180" width="240" height="240" rx="14" fill="#ede9fe" stroke="#6d28d9" stroke-width="2"/>
  <text x="1230" y="220" text-anchor="middle" font-size="22" font-weight="700" fill="#4c1d95">Anthropic</text>
  <text x="1230" y="246" text-anchor="middle" font-size="17" fill="#6d28d9">api.anthropic.com</text>
  <text x="1230" y="305" text-anchor="middle" font-size="15" fill="#475569" font-style="italic">OAuth tokens never</text>
  <text x="1230" y="328" text-anchor="middle" font-size="15" fill="#475569" font-style="italic">leave the agent host</text>

  <!-- Client <-> Hub : PTY frames over WSS -->
  <line x1="270" y1="300" x2="320" y2="300" stroke="#374151" stroke-width="2.5"
        marker-end="url(#arrow)" marker-start="url(#arrow-start)"/>
  <text x="295" y="284" text-anchor="middle" font-size="13" fill="#374151">WSS</text>
  <text x="295" y="320" text-anchor="middle" font-size="13" fill="#6b7280">PTY frames</text>

  <!-- Hub <-> Agent : WSS tunnel, agent dials out -->
  <line x1="610" y1="300" x2="660" y2="300" stroke="#374151" stroke-width="2.5"
        marker-end="url(#arrow)" marker-start="url(#arrow-start)"/>
  <text x="635" y="284" text-anchor="middle" font-size="13" fill="#374151">WSS</text>
  <text x="635" y="320" text-anchor="middle" font-size="13" fill="#6b7280">agent dials out</text>

  <!-- claude -> Anthropic -->
  <line x1="1030" y1="380" x2="1110" y2="310" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1100" y="370" text-anchor="end" font-size="13" fill="#374151">HTTPS · OAuth</text>

  <!-- Admin browser (dashed link from outside into the hub's SPA) -->
  <rect x="370" y="560" width="190" height="64" rx="8" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="465" y="588" text-anchor="middle" font-size="16" fill="#374151">browser</text>
  <text x="465" y="610" text-anchor="middle" font-size="13" fill="#6b7280">cookie-auth admin</text>
  <line x1="465" y1="560" x2="465" y2="480" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrow-dashed)"/>
</svg>
