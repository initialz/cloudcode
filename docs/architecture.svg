<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 460"
     font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <marker id="arrow-start" viewBox="0 0 10 10" refX="1" refY="5"
            markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 10 0 L 0 5 L 10 10 z" fill="#374151"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9ca3af"/>
    </marker>
  </defs>

  <text x="570" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">cloudcode architecture</text>
  <text x="570" y="52" text-anchor="middle" font-size="12" fill="#4b5563">PTY bytes stream from a native tmux+claude on the agent through the hub to any terminal</text>

  <!-- Client -->
  <rect x="20" y="120" width="190" height="170" rx="10" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="115" y="148" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Client</text>
  <text x="115" y="166" text-anchor="middle" font-size="12" fill="#1d4ed8">cloudcode</text>
  <text x="115" y="196" text-anchor="middle" font-size="11" fill="#1f2937">raw-mode PTY pump</text>
  <text x="115" y="214" text-anchor="middle" font-size="11" fill="#1f2937">menu picker · Ctrl+\</text>
  <text x="115" y="254" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">Laptop · phone · SSH</text>

  <!-- Hub -->
  <rect x="260" y="110" width="230" height="220" rx="10" fill="#d1fae5" stroke="#047857" stroke-width="1.5"/>
  <text x="375" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">Hub</text>
  <text x="375" y="156" text-anchor="middle" font-size="12" fill="#047857">cloudcode-hub</text>
  <text x="375" y="184" text-anchor="middle" font-size="11" fill="#1f2937">- PTY relay · session router</text>
  <text x="375" y="202" text-anchor="middle" font-size="11" fill="#1f2937">- account auth + 2-way ACL</text>
  <text x="375" y="220" text-anchor="middle" font-size="11" fill="#1f2937">- audit / sessions / messages</text>
  <!-- Admin SPA pill -->
  <rect x="285" y="240" width="180" height="58" rx="6" fill="#fff" stroke="#047857" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="375" y="260" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">embedded admin UI</text>
  <text x="375" y="278" text-anchor="middle" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#1f2937">React SPA · /admin/</text>
  <text x="375" y="292" text-anchor="middle" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#1f2937">SQLite backend</text>
  <text x="375" y="318" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">Public-facing host</text>

  <!-- Agent (with internal tmux+claude box) -->
  <rect x="540" y="100" width="320" height="240" rx="10" fill="#ffedd5" stroke="#c2410c" stroke-width="1.5"/>
  <text x="700" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">Agent</text>
  <text x="700" y="146" text-anchor="middle" font-size="12" fill="#9a3412">cloudcode-agent</text>
  <text x="700" y="172" text-anchor="middle" font-size="11" fill="#1f2937">dials hub over WSS</text>
  <text x="700" y="190" text-anchor="middle" font-size="11" fill="#1f2937">per-workspace tmux server</text>
  <text x="700" y="208" text-anchor="middle" font-size="11" fill="#1f2937">macOS Seatbelt sandbox (opt-in)</text>

  <!-- tmux + claude subprocess box -->
  <rect x="560" y="232" width="280" height="92" rx="6" fill="#fff" stroke="#c2410c" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="700" y="252" text-anchor="middle" font-size="11" font-weight="600" fill="#7c2d12">tmux + claude (per workspace)</text>
  <text x="700" y="272" text-anchor="middle" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#1f2937">tmux -L cc-&lt;acct&gt;-&lt;ws&gt;</text>
  <text x="700" y="288" text-anchor="middle" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#1f2937">└─ claude (native TUI)</text>
  <text x="700" y="312" text-anchor="middle" font-size="10" fill="#475569" font-style="italic">survives disconnect · auto --continue on reattach</text>

  <!-- Anthropic -->
  <rect x="910" y="120" width="210" height="170" rx="10" fill="#ede9fe" stroke="#6d28d9" stroke-width="1.5"/>
  <text x="1015" y="148" text-anchor="middle" font-size="14" font-weight="700" fill="#4c1d95">Anthropic</text>
  <text x="1015" y="166" text-anchor="middle" font-size="12" fill="#6d28d9">api.anthropic.com</text>
  <text x="1015" y="196" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">OAuth tokens never</text>
  <text x="1015" y="214" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">leave the agent host</text>

  <!-- Client <-> Hub : PTY frames over WSS -->
  <line x1="210" y1="200" x2="260" y2="200" stroke="#374151" stroke-width="2"
        marker-end="url(#arrow)" marker-start="url(#arrow-start)"/>
  <text x="235" y="188" text-anchor="middle" font-size="10" fill="#374151">WSS</text>
  <text x="235" y="216" text-anchor="middle" font-size="10" fill="#6b7280">PTY frames</text>

  <!-- Hub <-> Agent : WSS tunnel, agent dials -->
  <line x1="490" y1="200" x2="540" y2="200" stroke="#374151" stroke-width="2"
        marker-end="url(#arrow)" marker-start="url(#arrow-start)"/>
  <text x="515" y="188" text-anchor="middle" font-size="10" fill="#374151">WSS</text>
  <text x="515" y="216" text-anchor="middle" font-size="10" fill="#6b7280">agent dials out</text>

  <!-- claude -> Anthropic -->
  <line x1="840" y1="270" x2="910" y2="220" stroke="#374151" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="895" y="262" text-anchor="end" font-size="10" fill="#374151">HTTPS · OAuth</text>

  <!-- Admin browser (dashed) -->
  <rect x="300" y="372" width="150" height="46" rx="6" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="375" y="394" text-anchor="middle" font-size="12" fill="#374151">browser</text>
  <text x="375" y="411" text-anchor="middle" font-size="10" fill="#6b7280">cookie-auth admin</text>
  <line x1="375" y1="372" x2="375" y2="330" stroke="#9ca3af" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#arrow-dashed)"/>
</svg>
