<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 420"
     font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9ca3af"/>
    </marker>
  </defs>

  <text x="540" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">cloudcode 架构</text>
  <text x="540" y="52" text-anchor="middle" font-size="12" fill="#4b5563">凭据永不出 agent，hub 仅做鉴权 / 路由 / 审计</text>

  <!-- Client -->
  <rect x="20" y="100" width="180" height="140" rx="10" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="110" y="130" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Client</text>
  <text x="110" y="150" text-anchor="middle" font-size="12" fill="#1d4ed8">cloudcode + claude</text>
  <text x="110" y="180" text-anchor="middle" font-size="11" fill="#1f2937" font-family="ui-monospace, Menlo, monospace">cd ~/myproj</text>
  <text x="110" y="198" text-anchor="middle" font-size="11" fill="#1f2937" font-family="ui-monospace, Menlo, monospace">cloudcode run claude</text>
  <text x="110" y="222" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">本地源码 + 依赖</text>

  <!-- Hub -->
  <rect x="250" y="100" width="220" height="140" rx="10" fill="#d1fae5" stroke="#047857" stroke-width="1.5"/>
  <text x="360" y="130" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">Hub</text>
  <text x="360" y="150" text-anchor="middle" font-size="12" fill="#047857">cloudcode-hub</text>
  <text x="360" y="176" text-anchor="middle" font-size="11" fill="#1f2937">- 账号 token 鉴权</text>
  <text x="360" y="194" text-anchor="middle" font-size="11" fill="#1f2937">- ACL / 路由</text>
  <text x="360" y="212" text-anchor="middle" font-size="11" fill="#1f2937">- JSONL 审计</text>

  <!-- Agent -->
  <rect x="520" y="100" width="240" height="140" rx="10" fill="#ffedd5" stroke="#c2410c" stroke-width="1.5"/>
  <text x="640" y="130" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">Agent</text>
  <text x="640" y="150" text-anchor="middle" font-size="12" fill="#9a3412">cloudcode-agent</text>
  <text x="640" y="176" text-anchor="middle" font-size="11" fill="#1f2937">读 ~/.claude/.credentials.json</text>
  <text x="640" y="194" text-anchor="middle" font-size="11" fill="#1f2937">OAuth Bearer + 自动 refresh</text>
  <text x="640" y="218" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">已 claude /login 的机器</text>

  <!-- Anthropic -->
  <rect x="810" y="100" width="180" height="140" rx="10" fill="#ede9fe" stroke="#6d28d9" stroke-width="1.5"/>
  <text x="900" y="130" text-anchor="middle" font-size="14" font-weight="700" fill="#4c1d95">Anthropic</text>
  <text x="900" y="150" text-anchor="middle" font-size="12" fill="#6d28d9">api.anthropic.com</text>
  <text x="900" y="182" text-anchor="middle" font-size="11" fill="#1f2937" font-family="ui-monospace, Menlo, monospace">/v1/messages</text>

  <!-- Main arrows -->
  <line x1="200" y1="170" x2="250" y2="170" stroke="#374151" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="225" y="160" text-anchor="middle" font-size="10" fill="#374151">Bearer cc_*</text>

  <line x1="470" y1="170" x2="520" y2="170" stroke="#374151" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="495" y="160" text-anchor="middle" font-size="10" fill="#374151">Bearer ag_*</text>
  <text x="495" y="184" text-anchor="middle" font-size="9" fill="#6b7280">订阅模式</text>

  <line x1="760" y1="170" x2="810" y2="170" stroke="#374151" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="785" y="160" text-anchor="middle" font-size="10" fill="#374151">Bearer oauth</text>

  <!-- Audit (dashed box + dashed link from hub) -->
  <rect x="290" y="310" width="140" height="46" rx="6" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="360" y="332" text-anchor="middle" font-size="12" fill="#374151" font-family="ui-monospace, Menlo, monospace">audit.jsonl</text>
  <text x="360" y="349" text-anchor="middle" font-size="10" fill="#6b7280">每请求一行</text>
  <line x1="360" y1="240" x2="360" y2="310" stroke="#9ca3af" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#arrow-dashed)"/>

  <!-- Fallback dashed arc: hub bottom-right -> anthropic bottom -->
  <path d="M 430 240 C 500 350, 820 350, 900 240" fill="none" stroke="#9ca3af" stroke-width="1.4" stroke-dasharray="6,4" marker-end="url(#arrow-dashed)"/>
  <text x="665" y="362" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">api-key fallback (x-api-key)</text>
</svg>
