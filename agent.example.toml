# Cloudcode Agent 配置示例。
# 一次性初始化：`cloudcode-agent --init --config agent.toml`
#   会生成 agent.toml 模板（含 token placeholder）。你的 hub 管理员需要
#   把 `cloudcode-hub --init` 当时打印的明文 registration token 给你，
#   粘到下面 [auth].registration_token。
#
# 前台运行：cloudcode-agent --config agent.toml          （日志打到标准输出）
# 后台运行：cloudcode-agent daemon start --config agent.toml

[hub]
# Hub 的 WebSocket 端点。生产用 wss://；本机调试可用 ws://127.0.0.1:7100/v1/agent/ws。
url = "wss://hub.example.com/v1/agent/ws"

[agent]
# 可选。不填则自动用 `<hostname>-<user>`（小写，非法字符转 `-`）。
# 如果 hub 报 name_taken，再填一个固定值。
# name = "peter-mbp"

[auth]
# 全局 agent registration token，由 hub 管理员在 `cloudcode-hub --init` 时
# 打印一次。所有 agent 共享同一个 token，hub 用 argon2id 哈希验证。
registration_token = "ag_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

# [claude] 段可整段省略 —— 默认就够：
# - executable     = "claude"                          # PATH 查找
# - workspace_root = "~/cloudcode-agent/workspaces"    # 每个 workspace 一个目录
# - extra_args     = []                                # 追加到每次 claude 调用末尾
# Agent 每接到一个 user turn 都会 fork+exec `claude` 子进程，跨 turn 用
# `--resume <session_id>` 串联对话历史。务必让 agent 跟 `claude /login` 在
# 同一个系统账号下跑（claude 自己读 keychain / 文件凭据）。
# [claude]
# executable     = "claude"
# workspace_root = "~/cloudcode-agent/workspaces"
# extra_args     = []
