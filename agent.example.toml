# Cloudcode Agent 配置示例。
# 一次性初始化：`cloudcode-agent --init --config agent.toml`
#   会生成 agent.toml 模板（含 token placeholder）。你的 hub 管理员需要
#   把 `cloudcode-hub --init` 当时打印的明文 registration token 给你，
#   粘到下面 [auth].registration_token。
#
# 前台运行：cloudcode-agent --config agent.toml          （日志打到标准输出）
# 后台运行：cloudcode-agent daemon start --config agent.toml

[hub]
# Hub 的 WebSocket 端点。生产用 wss://；本机调试可用 ws://127.0.0.1:7100/v1/agent/ws。
url = "wss://hub.example.com/v1/agent/ws"

[agent]
# 可选。不填则自动用 `<hostname>-<user>`（小写，非法字符转 `-`）。
# 如果 hub 报 name_taken，再填一个固定值。
# name = "peter-mbp"

[auth]
# 全局 agent registration token，由 hub 管理员在 `cloudcode-hub --init` 时
# 打印一次。所有 agent 共享同一个 token，hub 用 argon2id 哈希验证。
registration_token = "ag_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

# [claude] 现在只用来设 workspace_root（每 workspace 一个子目录）。
# 旧的 executable / extra_args 字段还能解析，但运行时已经由 [tools.claude]
# 接管 —— 推荐迁到 [tools] 那一节。
# [claude]
# workspace_root = "~/cloudcode-agent/workspaces"

# [tools] 决定第一 pane 跑什么、并允许 split 出额外 pane 跑别的 AI CLI。
# 不写 [tools] 时 agent 会从 [claude] 段合成一个 `claude` 工具，行为跟
# 老版本一致；要并排跑 codex / 其他 CLI 时再开 [tools.<name>] 即可。
# [tools]
# default = "claude"
#
# [tools.claude]
# executable     = "claude"
# resume_command = "claude --continue"   # 空串 -> 不 resume，重连永远 fresh
# extra_args     = []
#
# [tools.codex]
# executable     = "codex"
# resume_command = ""                    # codex 没有 resume，每次新启
# extra_args     = []

# [tmux] 段可省略 —— 默认 PATH 查找 `tmux`：
# [tmux]
# executable = "tmux"

# [recording] 段可省略 —— 每个 session 自动 tee 一份 asciinema cast 到
# ~/.local/state/cloudcode/agent/recordings/<workspace>/<session_id>.cast，
# 只录输出，不录键盘。回放：asciinema play <file>。
# [recording]
# dir       = "~/.local/state/cloudcode/agent/recordings"
# keep_days = 0     # 0 = 永久保留（MVP 暂不做自动 GC）
