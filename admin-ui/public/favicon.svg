<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" fill="none">
  <style>
    .stroke { stroke: #18181b; }
    .fill   { fill:   #18181b; fill-opacity: 0.08; }
    @media (prefers-color-scheme: dark) {
      .stroke { stroke: #fafafa; }
      .fill   { fill:   #fafafa; fill-opacity: 0.12; }
    }
  </style>
  <!-- cloud silhouette -->
  <path class="stroke fill"
        d="M18 44 C9 44, 9 30, 18 30 C16 19, 31 16, 35 25 C41 17, 54 22, 50 31 C58 31, 58 44, 50 44 Z"
        stroke-width="3" stroke-linejoin="round"/>
  <!-- terminal prompt > -->
  <polyline class="stroke" points="23 30, 30 36, 23 42"
            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- cursor _ -->
  <line class="stroke" x1="33" y1="42" x2="44" y2="42"
        stroke-width="2.5" stroke-linecap="round"/>
</svg>
